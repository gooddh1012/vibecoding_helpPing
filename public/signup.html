<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 관리 시스템 - 회원가입</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .signup-container {
            background-color: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .signup-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .signup-header p {
            font-size: 14px;
            color: #888;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #5b86e5;
            margin: 24px 0 12px 0;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
            margin-left: 10px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #666;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 1.5px solid #eee;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-bottom-color: #5b86e5;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background-color: #5b86e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .signup-btn:hover {
            background-color: #4a72d4;
        }

        .footer-link {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .footer-link a {
            color: #5b86e5;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="signup-header">
        <h1>회원가입</h1>
        <p>배움의 여정을 함께 시작해요.</p>
    </div>

    <form id="signupForm">
        <div class="section-title">계정 정보</div>
        <div class="input-group">
            <label for="email">이메일</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>
        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="영문, 숫자 포함 8자 이상" required>
        </div>

        <div class="section-title">수강생 정보</div>
        <div class="input-group">
            <label for="name">이름 (본명)</label>
            <input type="text" id="name" placeholder="실명을 입력해주세요" required>
        </div>
        <div class="input-group">
            <label for="studentId">학번 또는 강의코드</label>
            <input type="text" id="studentId" placeholder="예: 20240001">
        </div>

        <button type="submit" class="signup-btn">가입 완료</button>
    </form>

    <div class="footer-link">
        이미 계정이 있으신가요? <a href="/">로그인</a>
    </div>
</div>

<script>
document.getElementById('signupForm').onsubmit = async (e) => {
    e.preventDefault();
    
    const signupData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        name: document.getElementById('name').value,
        studentId: document.getElementById('studentId').value
    };

    const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(signupData)
    });

    const result = await res.json();
    if (result.success) {
        alert("회원가입이 완료되었습니다! 로그인해주세요.");
        window.location.href = "/";
    } else {
        alert("가입 실패: " + result.message);
    }
};
</script>

</body>
</html>
