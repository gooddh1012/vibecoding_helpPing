<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 관리 시스템 - 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .login-header p {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #666;
        }

        .input-group input {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-bottom: 1.5px solid #eee;
            font-size: 16px;
            transition: border-color 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-bottom-color: #5b86e5;
        }

        .form-utils {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        .form-utils a {
            font-size: 13px;
            color: #999;
            text-decoration: none;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #5b86e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #4a72d4;
        }

        .footer-link {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #f5f5f5;
            font-size: 14px;
            color: #888;
        }

        .footer-link a {
            color: #5b86e5;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1>로그인</h1>
        <p>수강생 여러분의 학습을 응원합니다.</p>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label for="email">이메일</label>
            <input type="email" id="email" placeholder="example@email.com" required>
        </div>
        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
        </div>

        <div class="form-utils">
            <a href="#">비밀번호를 잊으셨나요?</a>
        </div>

        <button type="submit" class="login-btn">로그인하기</button>
    </form>

    <div class="footer-link">
        처음이신가요? <a href="/signup.html">회원가입</a>
    </div>
</div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) =>{
            e.preventDefault();
        
            const logindata = {
                email : document.getElementById('email').value,
                password : document.getElementById('password').value
            };
            const res = await fetch("/login",{
                method :"POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(logindata)
            });
            const result = await res.json();
        
            if(result.success){
                alert("로그인 성공");
                window.location.href="/select.html";
            }
            else{
                alert("로그인 실패");
            }
        };

    </script>

</body>
</html>
