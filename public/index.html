<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>PDF 학습 시스템</title>

<style>

body {
  font-family: Arial;
  margin: 40px;
}

.section {
  margin-bottom: 40px;
}

pre {
  background: #eee;
  padding: 15px;
}

</style>

</head>

<body>

<h1>PDF 학습 시스템</h1>

<!-- 업로드 -->

<div class="section">

<h2>PDF 업로드</h2>

<form id="uploadForm">

<input
type="file"
name="pdf"
accept=".pdf"
required
>

<br><br>

<button type="submit">
업로드
</button>

</form>

</div>

<!-- 질문 -->

<div class="section">

<h2>질문</h2>

<input
type="text"
id="question"
placeholder="예: 이진탐색 언제 배웠어"
style="width:300px"
>

<br><br>

<button onclick="ask()">
질문
</button>

</div>

<!-- 요약 -->

<div class="section">

<h2>전체 요약</h2>

<button onclick="summary()">
요약 실행
</button>

</div>

<h2>결과</h2>

<pre id="result">
여기에 결과가 표시됩니다.
</pre>

<script>

document
.getElementById("uploadForm")
.onsubmit = async (e) => {

e.preventDefault();

const formData =
new FormData(e.target);

const res =
await fetch("/upload", {

method:"POST",

body:formData

});

document
.getElementById("result")
.textContent =
await res.text();

};

async function ask() {

const question =
document
.getElementById("question")
.value;

const res =
await fetch("/question", {

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
question
})

});

document
.getElementById("result")
.textContent =
await res.text();

}

async function summary() {

const res =
await fetch("/summary");

document
.getElementById("result")
.textContent =
await res.text();

}

</script>

</body>
</html>
