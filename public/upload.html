        * {

        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .upload-container {
            background-color: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .upload-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .upload-header p {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .file-box {
            margin-bottom: 24px;
            text-align: left;
        }

        .file-box label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #666;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1.5px dashed #eee;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #777;
            transition: all 0.3s;
        }

        input[type="file"]:hover {
            border-color: #5b86e5;
            background-color: #fbfcfe;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #5b86e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #4a72d4;
        }

        .back-btn {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #999;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: #f5f5f5;
            color: #666;
        }

        #status {
            margin-top: 15px;
            font-size: 13px;
            color: #5b86e5;
            display: none;
        }
    </style>
</head>

</div>
