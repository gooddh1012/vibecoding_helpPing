<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 관리 시스템 - 자료 업로드</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .upload-container {
            background-color: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .upload-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .upload-header p {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .file-box {
            margin-bottom: 24px;
            text-align: left;
        }

        .file-box label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #666;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1.5px dashed #eee;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #777;
            transition: all 0.3s;
        }

        input[type="file"]:hover {
            border-color: #5b86e5;
            background-color: #fbfcfe;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #5b86e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #4a72d4;
        }

        .back-btn {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #999;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background-color: #f5f5f5;
            color: #666;
        }

        #status {
            margin-top: 15px;
            font-size: 13px;
            color: #5b86e5;
            display: none;
        }
    </style>
</head>
<body>

<div class="upload-container">
    <div class="upload-header">
        <h1>자료 업로드</h1>
        <p>학습할 PDF 파일을 선택해 주세요.</p>
    </div>

    <form id="uploadForm">
        <div class="file-box">
            <label>PDF 파일</label>
            <input type="file" name="pdf" accept=".pdf" required>
        </div>

        <div class="btn-group">
            <button type="submit" class="submit-btn">업로드 시작</button>
            <button type="button" class="back-btn" onclick="location.href ='select.html'">선택 화면으로 돌아가기</button>
        </div>
    </form>

    <div id="status">파일 분석 중... 잠시만 기다려 주세요.</div>
</div>

<script>
    document.getElementById("uploadForm").onsubmit = async (e) => {
        e.preventDefault();
        
        const statusText = document.getElementById("status");
        const submitBtn = e.target.querySelector(".submit-btn");

        // UI 피드백
        statusText.style.display = "block";
        submitBtn.disabled = true;
        submitBtn.innerText = "업로드 중...";
        submitBtn.style.backgroundColor = "#ccc";

        const formData = new FormData(e.target);
        
        try {
            const res = await fetch("/upload", {
                method: "POST",
                body: formData
            });

            if (res.ok) {
                alert("성공적으로 업로드되었습니다!");
            } else {
                alert("업로드에 실패했습니다.");
            }
        } catch (error) {
            alert("서버 연결 오류가 발생했습니다.");
        } finally {
            statusText.style.display = "none";
            submitBtn.disabled = false;
            submitBtn.innerText = "업로드 시작";
            submitBtn.style.backgroundColor = "#5b86e5";
        }
    }
</script>

</body>
</html>
